services:
  - type: web
    name: spendsense-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      python --version
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        sync: false